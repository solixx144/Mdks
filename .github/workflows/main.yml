name: Android CI (APK Üretici)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
    
    - name: Java 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Gradlew Dosyasına İzin Ver
      run: chmod +x gradlew
      
    - name: APK Derlemesini Başlat (İmza ve KSP Korumalı)
      run: ./gradlew assembleDebug -x validateSigningDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

    - name: APK Dosyasını Çıktı Olarak Ver
      uses: actions/upload-artifact@v4
      with:
        name: SherlockApp-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
