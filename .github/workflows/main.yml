name: Android CI (APK Üretici)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
    
    - name: Java 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Eksik Keystore Dosyasını Otomatik Oluştur
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Gradlew Dosyasına İzin Ver
      run: chmod +x gradlew
      
    - name: APK Derlemesini Başlat
      run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

    - name: APK Dosyasını Çıktı Olarak Ver
      uses: actions/upload-artifact@v4
      with:
        name: SherlockApp-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
